# Hot policy: when a non-root, non-allowlisted process reads a credential
# file, return EACCES from the open syscall instead of allowing the read.
#
# The Override action is preferred over Sigkill for this case: many tools
# probe these files (auditd, monitoring agents) and we'd rather not kill
# them — failing the read is enough to defeat exfiltration while leaving
# legit ops paths a chance to log the failure and back off.
#
# The complete deny-list lives in match.values; extend as your fleet
# matures. Keep the allowlist narrow.
#
# Note: do NOT add a bare "/home/" prefix — security_file_permission fires
# for every read under that path, so a blanket /home/ entry blocks bash
# from sourcing .bashrc, prevents systemd from execing the engine binary
# in /home/ubuntu/ebpf-poc/, and locks `make deploy` itself out of the VM.
# Pin to specific credential subpaths (~/.ssh/, ~/.aws/, ~/.gnupg/, etc.)
# instead.
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: "override-credential-read"
spec:
  kprobes:
    - call: "security_file_permission"
      syscall: false
      return: true
      args:
        - index: 0
          type: "file"
        - index: 1
          type: "int"
      returnArg:
        index: 0
        type: "int"
      selectors:
        - matchBinaries:
            - operator: "NotIn"
              values:
                - "/usr/sbin/sshd"
                - "/usr/bin/sudo"
                - "/usr/bin/su"
                - "/usr/sbin/cron"
                - "/usr/lib/systemd/systemd"
          matchArgs:
            - index: 0
              operator: "Prefix"
              values:
                - "/etc/shadow"
                - "/etc/gshadow"
                - "/root/.ssh/"
                - "/home/ubuntu/.ssh/"
                - "/home/ubuntu/.aws/"
                - "/home/ubuntu/.kube/"
                - "/home/ubuntu/.gnupg/"
                - "/home/ubuntu/.netrc"
            - index: 1
              operator: "Mask"
              values:
                - "4"   # MAY_READ
          matchActions:
            - action: Override
              argError: -13   # EACCES
